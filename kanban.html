<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="myFindr Hub">
  <meta name="theme-color" content="#E64500">

<title>myFindr — Project Kanban</title>
<!-- v16 -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:#0a0a0a;color:#fff;height:100vh;overflow:hidden;user-select:none}
  header{background:#111;border-bottom:1px solid #1f1f1f;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  header img{height:26px;filter:invert(1)}
  .hr{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .ts{font-size:11px;color:#555}
  .live{background:rgba(34,197,94,.15);color:#22c55e;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px}
  .hint{font-size:11px;color:#444;font-style:italic}
  .sync{font-size:11px;padding:4px 10px;border-radius:20px;transition:all .3s}
  .sok{background:rgba(34,197,94,.1);color:#22c55e}
  .ssaving{background:rgba(234,179,8,.1);color:#eab308}
  .serr{background:rgba(239,68,68,.1);color:#ef4444}
  .board{display:flex;gap:12px;padding:18px;align-items:flex-start;height:calc(100vh - 56px);width:100vw;overflow-x:auto;overflow-y:hidden}
  .col{width:272px;flex-shrink:0;display:flex;flex-direction:column;height:100%}
  .ch{padding:11px 13px 9px;border-radius:10px 10px 0 0;flex-shrink:0}
  .ct{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:2px}
  .cc{font-size:11px;opacity:.5}
  .cb{padding:5px;padding-bottom:60px;border-radius:0 0 10px 10px;transition:background .15s;flex:1;overflow-y:auto;min-height:0;scrollbar-width:thin;scrollbar-color:#222 transparent}
  .cb::-webkit-scrollbar{width:4px}
  .cb::-webkit-scrollbar-track{background:transparent}
  .cb::-webkit-scrollbar-thumb{background:#222;border-radius:2px}
  .cb.over{background:rgba(255,255,255,.04);outline:2px dashed #333;outline-offset:-2px}
  .jay .ch{background:#0a0a1a;border-top:3px solid #3b82f6}.jay .ct{color:#3b82f6}.jay .cb{background:#08080f}
  .george .ch{background:#1a0e00;border-top:3px solid #E64500}.george .ct{color:#E64500}.george .cb{background:#120900}
  .urgent .ch{background:#1a0a00;border-top:3px solid #f97316}.urgent .ct{color:#f97316}.urgent .cb{background:#130800}
  .blocked .ch{background:#150000;border-top:3px solid #ef4444}.blocked .ct{color:#ef4444}.blocked .cb{background:#110000}
  .waiting .ch{background:#0e0e0e;border-top:3px solid #555}.waiting .ct{color:#888}.waiting .cb{background:#0b0b0b}
  .night .ch{background:#080820;border-top:3px solid #6366f1}.night .ct{color:#818cf8}.night .cb{background:#06061a}
  .done .ch{background:#001a0a;border-top:3px solid #22c55e}.done .ct{color:#22c55e}.done .cb{background:#001208}
  .card{background:#111;border:1px solid #1f1f1f;border-radius:9px;padding:11px 13px;margin-bottom:6px;cursor:grab;transition:opacity .15s,transform .15s,box-shadow .15s}
  .card:hover{border-color:#2a2a2a;box-shadow:0 4px 14px rgba(0,0,0,.4)}
  .card.dragging{opacity:.3;transform:scale(.96);cursor:grabbing}
  .card-title{font-size:12px;font-weight:700;color:#fff;margin-bottom:5px;line-height:1.3}
  .card-body{font-size:11px;color:#666;line-height:1.5;margin-bottom:8px}
  .cf{display:flex;align-items:center;justify-content:space-between;gap:6px;flex-wrap:wrap}
  .ctags{display:flex;gap:4px;flex-wrap:wrap}
  .cstats{display:flex;align-items:center;gap:6px;flex-shrink:0}
  .tag{display:inline-block;padding:2px 6px;border-radius:8px;font-size:9px;font-weight:700}
  .te{background:rgba(59,130,246,.15);color:#3b82f6}.tc{background:rgba(168,85,247,.15);color:#a855f7}
  .td{background:rgba(234,179,8,.15);color:#eab308}.tf{background:rgba(20,184,166,.15);color:#14b8a6}
  .tk{background:rgba(249,115,22,.15);color:#f97316}.ti{background:rgba(236,72,153,.15);color:#ec4899}
  .tm{background:rgba(99,102,241,.15);color:#6366f1}.tn{background:rgba(16,185,129,.15);color:#10b981}
  .th{background:rgba(230,69,0,.15);color:#E64500}.tz{background:rgba(255,140,0,.15);color:#ff8c00}
  .tl{background:rgba(139,92,246,.15);color:#8b5cf6}.ta{background:rgba(34,197,94,.15);color:#22c55e}
  .tv{background:rgba(107,114,128,.15);color:#9ca3af}.ts2{background:rgba(250,204,21,.15);color:#facc15}
  .tt{background:rgba(99,102,241,.15);color:#6366f1}
  .eta{font-size:10px;color:#555;white-space:nowrap}.eta span{color:#888}
  .ref-btn{display:inline-block;margin:6px 0 8px;font-size:10px;font-weight:700;color:#E64500;background:rgba(230,69,0,.1);border:1px solid rgba(230,69,0,.3);border-radius:6px;padding:4px 10px;text-decoration:none;letter-spacing:.02em;cursor:pointer}
  .ref-btn:hover{background:rgba(230,69,0,.2)}
  .bw{display:flex;align-items:center;gap:3px}
  .bwl{font-size:9px;color:#444}
  .pips{display:flex;gap:2px}
  .pip{width:5px;height:5px;border-radius:1px;background:#1f1f1f}
  .low{background:#22c55e}.mid{background:#eab308}.hi{background:#ef4444}
  .note{font-size:10px;color:#333;margin-top:6px;padding-top:6px;border-top:1px solid #161616;font-style:italic;line-height:1.4}
  .moon{font-size:9px;background:rgba(99,102,241,.15);color:#818cf8;padding:2px 6px;border-radius:4px;font-weight:700}
  .toast{position:fixed;bottom:20px;right:20px;background:#1f1f1f;border:1px solid #333;border-radius:10px;padding:12px 18px;font-size:13px;display:none;z-index:999;max-width:300px}
  .toast.show{display:block;animation:su .2s ease}
  @keyframes su{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}

  /* ── MOBILE ── */

  @media (max-width: 768px) {
    .bw { display: none; }
    
    
    .cb { padding-bottom: 80px; }
    .moon { display: none; }
  }
  @media (max-width: 768px) {
    .board { padding: 10px; gap: 10px; }
    .col { width: 82vw; flex-shrink: 0; }
    header { padding: 10px 14px; flex-wrap: wrap; gap: 8px; }
    header img { height: 22px; }
    .nav { gap: 3px; }
    .nav a { padding: 6px 10px; font-size: 11px; }
    .live { font-size: 10px; padding: 3px 8px; }
    .card { padding: 10px 11px; }
    .card-title { font-size: 12px; }
    .card-body { font-size: 11px; }
    .tag { font-size: 9px; padding: 1px 5px; }
    .cf { flex-direction: column; gap: 6px; align-items: flex-start; }
    .ch { padding: 10px 11px 8px; }
    .ct { font-size: 10px; }
  }


  }
  }

  .col-select {
    display: none;
    margin: 10px 0 4px;
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #999;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-family: Inter, sans-serif;
    -webkit-appearance: none;
    appearance: none;
    letter-spacing: -0.2px;
  }

  /* FINAL OVERRIDE: desktop no dropdown, mobile yes */
  @media (hover: hover) and (pointer: fine) {
    .col-select { display: none !important; visibility: hidden !important; }
  }
</style>
</head>

const COLS = ['jay','george','urgent','blocked','waiting','night','done'];
const COL_LABELS = {jay:'Waiting for Jay',george:'George Working On',urgent:'Needs to Be Done',blocked:'Blocked',waiting:'Backlog',night:'Overnight',done:'Done ✓'};

function pip(bw) {
  if (!bw) return '';
  const p = Array.from({length:10},(_,i) => {
    let c = 'pip';
    if (i < bw) c += bw<=3?' low':bw<=6?' mid':' hi';
    return `<div class="${c}"></div>`;
  }).join('');
  return `<div class="bw"><span class="bwl">BW</span><div class="pips">${p}</div></div>`;
}
function etaStr(m) { if (!m) return ''; return m < 60 ? m+'m' : Math.round(m/60*10)/10+'h'; }

function mkCard(id, col, startedAt) {
  const m = CARDS[id]; if (!m) return null;
  const d = document.createElement('div');
  d.className = 'card'; d.id = id; d.draggable = true;

  const TAG_CSS = {email:'te',content:'tc',databox:'td',framer:'tf',klaviyo:'tk',instagram:'ti',
    manychats:'tm',newie:'tn',hubspot:'th',zapier:'tz',kling:'tl',data:'ta',dev:'tv',strategy:'ts2',typeform:'tt'};
  const TAG_NAMES = {te:'email',tc:'content',td:'databox',tf:'framer',tk:'klaviyo',ti:'instagram',
    tm:'manychats',tn:'newie',th:'hubspot',tz:'zapier',tl:'kling',ta:'data',tv:'dev',ts2:'strategy',tt:'typeform'};

  const tags = (m.tags||[]).map(t => '<span class="tag ' + (t||'') + '">' + (TAG_NAMES[t]||t) + '</span>').join('');
  const eta = m.eta || 0;
  const bw = m.bw || 0;
  const prog = m.prog !== undefined ? m.prog : 0;
  const night = (bw >= 7 && eta >= 60) ? '<span class="moon">🌙 overnight</span>' : '';

  // ETA display
  const etaHtml = eta > 0 ? '<span class="eta">⏱ <span>' + (eta < 60 ? eta + 'm' : Math.round(eta/60*10)/10 + 'h') + '</span></span>' : '';

  // BW pips
  let pipHtml = '';
  if (bw > 0) {
    let pips = '';
    for (let i = 0; i < 10; i++) {
      const on = i < bw ? (bw <= 3 ? ' low' : bw <= 6 ? ' mid' : ' hi') : '';
      pips += '<div class="pip' + on + '"></div>';
    }
    pipHtml = '<div class="bw"><span class="bwl">BW</span><div class="pips">' + pips + '</div></div>';
  }

  // Progress bar — show on all active cards
  let progHtml = '';
  if (col !== 'done') {
    const pc = prog >= 80 ? '#22c55e' : prog >= 40 ? '#eab308' : '#E64500';
    progHtml = '<div style="margin-top:8px"><div style="display:flex;justify-content:space-between;margin-bottom:3px">'
      + '<span style="font-size:9px;color:#444;font-weight:700;text-transform:uppercase">Progress</span>'
      + '<span style="font-size:10px;font-weight:800;color:' + pc + '">' + prog + '%</span></div>'
      + '<div style="height:4px;background:#1a1a1a;border-radius:2px;overflow:hidden">'
      + '<div style="width:' + prog + '%;height:100%;background:' + pc + ';border-radius:2px"></div></div></div>';
  }

  // Finish time (George column only)
  let finishHtml = '';
  if (col === 'george' && eta > 0) {
    const base = startedAt ? new Date(startedAt) : new Date();
    const finish = new Date(base.getTime() + eta * 60000);
    const now = new Date();
    const mins = Math.round((finish - now) / 60000);
    const t = finish.toLocaleString('en-AU', {timeZone:'Australia/Brisbane', hour:'numeric', minute:'2-digit', hour12:true}).toLowerCase().replace(' ','');
    const over = finish <= now;
    finishHtml = '<div data-finish="' + finish.toISOString() + '" style="margin-top:9px;padding:8px 11px;background:' + (over?'#1a0800':'#0d0d00') + ';border:1px solid ' + (over?'#3a1500':'#2a2600') + ';border-radius:8px;display:flex;align-items:center;justify-content:space-between;gap:8px">'
      + '<span style="font-size:10px;font-weight:700;color:' + (over?'#f97316':'#eab308') + '">' + (over?'⏰ overdue':'⚡ finish') + '</span>'
      + '<span style="font-size:14px;font-weight:900;color:#fff">' + t + '</span>'
      + '<span style="font-size:10px;color:#555">' + (over ? Math.abs(mins)+'m ago' : mins+'m left') + '</span></div>';
  }

  // Build card HTML
  const refBtn = (m.ref && m.ref.url)
    ? '<a href="' + m.ref.url + '" target="_blank" rel="noopener" class="ref-btn" onclick="event.stopPropagation()">📋 ' + (m.ref.label||'Reference Sheet') + ' →</a>'
    : '';
  d.innerHTML = '<div class="card-title">' + m.t + '</div>'
    + '<div class="card-body">' + (m.b||'') + '</div>'
    + refBtn
    + '<div class="cf"><div class="ctags">' + tags + night + '</div>'
    + '<div class="cstats">' + etaHtml + pipHtml + '</div></div>'
    + (m.note ? '<div class="note">' + m.note + '</div>' : '')
    + finishHtml
    + progHtml;

  // Column select dropdown
  const COLS_LIST = ['jay','george','urgent','blocked','waiting','night','done'];
  const COL_LBL = {jay:'→ Jay',george:'→ George',urgent:'→ Needs Done',blocked:'→ Blocked',waiting:'→ Backlog',night:'→ Overnight',done:'→ Done ✓'};
  const sel = document.createElement('select');
  sel.className = 'col-select';
  let opts = '<option value="" disabled>📱 Move to…</option>';
  COLS_LIST.forEach(c => { opts += '<option value="' + c + '"' + (col===c?' selected':'') + '>' + COL_LBL[c] + '</option>'; });
  sel.innerHTML = opts;
  sel.onchange = function() { if (this.value) moveCardTo(id, this.value, this); };
  // Always append, CSS controls visibility
  // Show dropdown only on touch/mobile
  const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0 || window.innerWidth <= 900;
  if (isTouchDevice) {
    sel.style.display = 'block';
    sel.style.marginBottom = '4px';
  }
  d.appendChild(sel);

  return d;
}

function moveCardTo(cardId, newCol, selectEl) {
  if (!newCol) return;
  const card = document.getElementById(cardId);
  const targetCol = document.getElementById('col-' + newCol);
  if (card && targetCol) {
    targetCol.appendChild(card);
    // Update all dropdowns on this card to show new col as selected
    const sel = card.querySelector('.col-select');
    if (sel) {
      Array.from(sel.options).forEach(o => o.selected = (o.value === newCol));
      sel.value = newCol;
    }
    saveMove(cardId, newCol, 'jay');
    countAll();
  }
}

// LOW risk (< 30m over): George auto-recovers silently
// HIGH risk (30m+ over, or BW 8-10): Alert Jay via visual badge

const STALL_PLAYBOOK = {
  c8:  { risk:'high', recovery:'Framer blocked by browser access — George will build HTML mockup first and push to Framer manually. Jay action: none needed yet.' },
  c9:  { risk:'low',  recovery:'Klaviyo campaign setup — George can complete this autonomously. Re-queuing.' },

function checkStalls() {
  document.querySelectorAll('#col-george .card').forEach(card => {
    const finishEl = card.querySelector('[data-finish]');
    if (!finishEl) return;
    const finish = new Date(finishEl.dataset.finish);
    const now = new Date();
    const minsOver = Math.round((now - finish) / 60000);
    if (minsOver <= 15) return; // Grace period

    const id = card.id;
    const title = card.querySelector('.card-title')?.textContent || id;
    const playbook = STALL_PLAYBOOK[id] || { risk: minsOver > 30 ? 'high' : 'low', recovery: 'George reassessing task — will reprioritise or request help.' };
    const isHigh = playbook.risk === 'high' || minsOver > 30;

    // Visual border
    card.style.borderColor = isHigh ? '#ef4444' : '#eab308';
    card.style.borderWidth = '2px';

    // Add/update stall badge
    let badge = card.querySelector('.stall-badge');
    if (!badge) {
      badge = document.createElement('div');
      badge.className = 'stall-badge';
      card.appendChild(badge);
    }
    badge.style.cssText = 'margin-top:8px;padding:9px 11px;background:' + (isHigh?'#1a0000':'#1a1000') + ';border:1px solid ' + (isHigh?'#3a0000':'#3a2500') + ';border-radius:8px;font-size:11px;line-height:1.5';
    badge.innerHTML = (isHigh
      ? '<span style="color:#ef4444;font-weight:700">⚠️ STALLED ' + minsOver + 'm — Jay action needed</span><br>'
      : '<span style="color:#eab308;font-weight:700">🔄 Overdue ' + minsOver + 'm — George recovering</span><br>')
      + '<span style="color:#666;font-size:10px">' + playbook.recovery + '</span>';
  });
}
setInterval(checkStalls, 300000);
setTimeout(checkStalls, 5000);

async function saveMove(cardId, newCol, movedBy) {
  if (!GH_TOKEN) { showToast('Tap "Tap to enable sync" in header to save moves'); return; }
  setSS('ssaving','● Saving...');
  try {
    // Get current state first
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
      headers: {'Authorization':'Bearer '+GH_TOKEN,'Accept':'application/vnd.github.v3+json'}
    });
    const data = await r.json();
    fileSHA = data.sha;
    const state = JSON.parse(atob(data.content.replace(/\n/g,'')));
    
    const oldCol = state.cards[cardId];
    state.cards[cardId] = newCol;
    // Stamp start time when moving to George's column
    if (newCol === 'george') {
      if (!state.started) state.started = {};
      state.started[cardId] = new Date().toISOString();
    }
    // Clear start time if moved away from george
    if (newCol !== 'george' && state.started && state.started[cardId]) {
      delete state.started[cardId];
    }
    state.updated = new Date().toISOString();
    state.updated_by = movedBy;
    state.last_move = {card: cardId, from: oldCol, to: newCol, by: movedBy, at: state.updated};
    
    const newContent = btoa(unescape(encodeURIComponent(JSON.stringify(state, null, 2))));
    const pr = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
      method: 'PUT',
      headers: {'Authorization':'Bearer '+GH_TOKEN,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
      body: JSON.stringify({message: `Kanban: ${CARDS[cardId]?.t?.substring(0,40)} → ${newCol} (by ${movedBy})`, content: newContent, sha: fileSHA})
    });
    const pd = await pr.json();
    fileSHA = pd.content?.sha || fileSHA;
    
    setSS('sok','● Synced');
    const ts = new Date().toLocaleString('en-AU',{timeZone:'Australia/Brisbane',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
    document.getElementById('ts').textContent = `Updated: ${ts} AEST by ${movedBy}`;
    showToast(`"${CARDS[cardId]?.t?.substring(0,35)}..." → ${COL_LABELS[newCol]||newCol}`);
  } catch(e) { setSS('serr','● Save failed'); console.error(e); }
}

let drag=null, dsrc=null;
function bindDrag() {
  document.querySelectorAll('.card').forEach(c => {
    c.addEventListener('dragstart', e=>{ drag=c; dsrc=c.parentElement; setTimeout(()=>c.classList.add('dragging'),0); e.dataTransfer.effectAllowed='move'; });
    c.addEventListener('dragend', ()=>{ c.classList.remove('dragging'); document.querySelectorAll('.cb').forEach(b=>b.classList.remove('over')); countAll(); drag=null; dsrc=null; });
  });
  document.querySelectorAll('.cb').forEach(col=>{
    col.addEventListener('dragover', e=>{ e.preventDefault(); col.classList.add('over'); });
    col.addEventListener('dragleave', e=>{ if (!col.contains(e.relatedTarget)) col.classList.remove('over'); });
    col.addEventListener('drop', e=>{
      e.preventDefault(); col.classList.remove('over');
      if (drag && col !== dsrc) {
        const nc = col.id.replace('col-','');
        col.appendChild(drag);
        saveMove(drag.id, nc, 'jay');
        countAll();
      }
    });
  });
}

function countAll() {
  COLS.forEach(id => {
    const n = document.getElementById('col-'+id)?.querySelectorAll('.card').length||0;
    const el = document.getElementById('n-'+id);
    if (el) el.textContent = n + ' card'+(n!==1?'s':'');
  });
}
function setSS(c,x) { const e=document.getElementById('sync'); e.className='sync '+c; e.textContent=x; }
let tt; function showToast(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(tt); tt=setTimeout(()=>t.classList.remove('show'),3500); }

loadState();

// Live countdown — refresh finish times every 60s without full reload
setInterval(() => {
  document.querySelectorAll('#col-george .card').forEach(card => {
    const finishEl = card.querySelector('[data-finish]');
    if (!finishEl) return;
    const finishTime = new Date(finishEl.dataset.finish);
    const now = new Date();
    const remaining = Math.round((finishTime - now) / 60000);
    const timeStr = finishTime.toLocaleString('en-AU', {timeZone:'Australia/Brisbane', hour:'2-digit', minute:'2-digit'});
    if (finishTime > now) {
      finishEl.innerHTML = `<span style="font-size:10px;color:#eab308;font-weight:600">⚡ Est. finish</span><span style="font-size:12px;font-weight:700;color:#fff">${timeStr} AEST</span><span style="font-size:10px;color:#666">${remaining}m left</span>`;
      finishEl.style.background = '#1a1a00';
      finishEl.style.borderColor = '#2a2a00';
    } else {
      const ago = Math.abs(remaining);
      finishEl.innerHTML = `<span style="font-size:10px;color:#f97316;font-weight:600">⏰ Overdue</span><span style="font-size:12px;font-weight:700;color:#f97316">Should be done</span><span style="font-size:10px;color:#666">${ago}m ago</span>`;
      finishEl.style.background = '#1a0a00';
      finishEl.style.borderColor = '#2a1000';
    }
  });
}, 60000);
